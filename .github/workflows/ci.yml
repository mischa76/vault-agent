name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
      - name: Sync deps
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Type-check
        run: uv run mypy src
      - name: Test
        run: uv run pytest -q
